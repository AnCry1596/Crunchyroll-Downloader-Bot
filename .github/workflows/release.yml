name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: crunchyroll-downloader-telegram-bot
            asset_name: crunchyroll-downloader-bot-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: crunchyroll-downloader-telegram-bot.exe
            asset_name: crunchyroll-downloader-bot-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev liblzma-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: crunchyroll-downloader-bot-linux-x86_64
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: crunchyroll-downloader-bot-windows-x86_64.exe
          path: artifacts/windows

      - name: Rename artifacts
        run: |
          mv artifacts/linux/crunchyroll-downloader-telegram-bot \
             artifacts/crunchyroll-downloader-bot-linux-x86_64
          mv artifacts/windows/crunchyroll-downloader-telegram-bot.exe \
             artifacts/crunchyroll-downloader-bot-windows-x86_64.exe
          chmod +x artifacts/crunchyroll-downloader-bot-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/crunchyroll-downloader-bot-linux-x86_64
            artifacts/crunchyroll-downloader-bot-windows-x86_64.exe
            config.example.toml
